services:
  api:
    build: .
    container_name: spellcast_api
    ports: 
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - spellcast_network

  redis:
    image: "redis:7-alpine"
    container_name: spellcast_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  spellcast_network:
    drive: bridge


